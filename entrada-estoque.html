<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarFlow - Entrada de Estoque</title>
    <style>
        :root {
            --primary: #ff6b35;
            --primary-dark: #e55a2b;
            --success: #00c853;
            --warning: #ff9100;
            --danger: #ff1744;
            --surface: #fff;
            --background: #f5f5f5;
            --text: #333;
            --text-muted: #666;
            --border: #ddd;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--background); color: var(--text); }
        
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; }
        .header-btn {
            background: white;
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        
        .form-section {
            background: var(--surface);
            margin: 15px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .form-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        
        .form-group { margin-bottom: 15px; }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-muted);
        }
        .form-input, .form-select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .products-list {
            margin-top: 20px;
        }
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--surface);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .product-info { flex: 1; }
        .product-name { font-weight: bold; font-size: 16px; }
        .product-stock { font-size: 14px; color: var(--text-muted); margin-top: 3px; }
        .product-qty {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .qty-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .qty-value {
            font-size: 20px;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }
        
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-primary:hover { background: var(--primary-dark); }
        
        .btn-secondary {
            padding: 10px 20px;
            background: var(--background);
            color: var(--text);
            border: 2px solid var(--border);
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .result-card {
            background: linear-gradient(135deg, var(--success), #00a843);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }
        .result-value { font-size: 32px; font-weight: bold; }
        .result-label { font-size: 14px; opacity: 0.9; }
        
        .footer {
            text-align: center;
            padding: 15px;
            background: var(--surface);
            color: var(--text-muted);
            font-size: 11px;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>📥 Entrada de Estoque</h1>
        <button class="header-btn" onclick="location.href='menu.html'">🏠 Menu</button>
    </header>
    
    <main>
        <div class="form-section">
            <div class="form-title">Adicionar Produkto</div>
            
            <div class="form-group">
                <label class="form-label">Produto</label>
                <select class="form-select" id="produto">
                    <option value="">Selecione...</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Quantidade</label>
                <div class="product-qty" style="justify-content: center;">
                    <button class="qty-btn" onclick="changeQty(-1)">-</button>
                    <span class="qty-value" id="qty">0</span>
                    <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Valor Unitário (R$)</label>
                <input type="number" class="form-input" id="valor-unitario" placeholder="0,00" step="0.01">
            </div>
            
            <button class="btn-primary" onclick="adicionar()">➕ Adicionar</button>
        </div>
        
        <div class="form-section">
            <div class="form-title">Entrada de Hoje</div>
            <div id="entradas-list">
                <div style="text-align: center; color: var(--text-muted); padding: 20px;">
                    Nenhuma entrada hoje
                </div>
            </div>
        </div>
        
        <div class="result-card">
            <div class="result-value" id="total-entradas">R$ 0,00</div>
            <div class="result-label">Total em Entradas</div>
        </div>
    </main>
    
    <footer class="footer">
        <span>Desenvolvido por</span> <strong style="color: var(--primary);">4dotcom</strong>
    </footer>

    <script>
        const API_BASE = '/api';
        let qty = 0;
        let entradas = [];
        
        async function loadProducts() {
            try {
                const res = await fetch(API_BASE + '/produtos');
                const produtos = await res.json();
                const select = document.getElementById('produto');
                select.innerHTML = '<option value="">Selecione...</option>' + 
                    produtos.map(p => `<option value="${p.id}">${p.nome} - R$ ${(p.preco || 0).toFixed(2)}</option>`).join('');
            } catch (e) {
                console.log('Erro:', e);
            }
        }
        
        function changeQty(delta) {
            qty = Math.max(0, qty + delta);
            document.getElementById('qty').textContent = qty;
        }
        
        function adicionar() {
            const produtoId = document.getElementById('produto').value;
            const valor = parseFloat(document.getElementById('valor-unitario').value) || 0;
            
            if (!produtoId || qty === 0) {
                alert('Selecione produto e quantidade!');
                return;
            }
            
            const entrada = {
                id: Date.now(),
                produto_id: produtoId,
                quantidade: qty,
                valor_unitario: valor,
                total: qty * valor,
                data: new Date().toISOString()
            };
            
            entradas.push(entrada);
            renderEntradas();
            
            // Reset
            qty = 0;
            document.getElementById('qty').textContent = 0;
            document.getElementById('produto').value = '';
            document.getElementById('valor-unitario').value = '';
            
            alert('Entrada adicionada! 💰');
        }
        
        function renderEntradas() {
            const list = document.getElementById('entradas-list');
            const total = entradas.reduce((s, e) => s + e.total, 0);
            
            document.getElementById('total-entradas').textContent = 'R$ ' + total.toFixed(2).replace('.', ',');
            
            if (entradas.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">Nenhuma entrada hoje</div>';
                return;
            }
            
            list.innerHTML = entradas.map(e => `
                <div class="product-item">
                    <div class="product-info">
                        <div class="product-name">Produto ${e.produto_id}</div>
                        <div class="product-stock">${e.quantidade} x R$ ${e.valor_unitario.toFixed(2)}</div>
                    </div>
                    <div style="font-weight: bold; color: var(--success);">
                        R$ ${e.total.toFixed(2).replace('.', ',')}
                    </div>
                </div>
            `).join('');
        }
        
        loadProducts();
    </script>
</body>
</html>
