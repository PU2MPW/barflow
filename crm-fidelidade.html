<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarFlow - CRM e Fidelidade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --secondary: #1A1A2E;
            --accent: #00D9FF;
            --success: #00C853;
            --warning: #FFB300;
            --danger: #FF1744;
            --bronze: #CD7F32;
            --silver: #C0C0C0;
            --gold: #FFD700;
            --background: #0F0F1A;
            --surface: #1A1A2E;
            --surface-light: #252542;
            --text: #FFFFFF;
            --text-muted: #9E9EB8;
            --border: #2D2D4A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            user-select: none;
        }

        .app-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }

        /* Header */
        .header {
            grid-column: 1 / -1;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface-light);
            padding: 10px 20px;
            border-radius: 10px;
            width: 300px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 14px;
            width: 100%;
            outline: none;
        }

        .header-btn {
            padding: 10px 20px;
            background: var(--surface-light);
            border: none;
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn:hover {
            background: var(--border);
        }

        .header-btn.primary {
            background: var(--primary);
        }

        /* Sidebar */
        .sidebar {
            background: var(--surface);
            padding: 20px;
            border-right: 1px solid var(--border);
        }

        .nav-item {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: var(--surface-light);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
        }

        .nav-icon {
            font-size: 20px;
        }

        /* Main Content */
        .main-content {
            padding: 25px;
            overflow-y: auto;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
        }

        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Tabs */
        .content-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .content-tab {
            padding: 12px 25px;
            background: var(--surface);
            border: none;
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .content-tab:hover {
            background: var(--surface-light);
        }

        .content-tab.active {
            background: var(--primary);
            color: white;
        }

        /* Customers Table */
        .customers-table {
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 60px 1fr 120px 100px 120px 100px 80px;
            padding: 15px 25px;
            background: var(--surface-light);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .customer-row {
            display: grid;
            grid-template-columns: 60px 1fr 120px 100px 120px 100px 80px;
            padding: 18px 25px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s;
        }

        .customer-row:hover {
            background: var(--surface-light);
        }

        .customer-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .customer-info h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .customer-info p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .tier-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .tier-badge.bronze { background: rgba(205, 127, 50, 0.2); color: var(--bronze); }
        .tier-badge.silver { background: rgba(192, 192, 192, 0.2); color: var(--silver); }
        .tier-badge.gold { background: rgba(255, 215, 0, 0.2); color: var(--gold); }
        .tier-badge.vip { background: rgba(255, 23, 68, 0.2); color: var(--danger); }

        .points-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--success);
        }

        .spent-value {
            font-size: 14px;
            font-weight: 600;
        }

        .action-btn {
            padding: 8px 12px;
            background: var(--surface-light);
            border: none;
            border-radius: 8px;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
        }

        .action-btn:hover {
            background: var(--primary);
        }

        /* Campaigns Section */
        .campaigns-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .campaign-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
        }

        .campaign-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .campaign-title {
            font-size: 18px;
            font-weight: 700;
        }

        .campaign-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .campaign-status.active {
            background: rgba(0, 200, 83, 0.2);
            color: var(--success);
        }

        .campaign-status.scheduled {
            background: rgba(0, 217, 255, 0.2);
            color: var(--accent);
        }

        .campaign-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .campaign-stats {
            display: flex;
            gap: 20px;
        }

        .campaign-stat {
            text-align: center;
        }

        .campaign-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .campaign-stat-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* New Campaign Button */
        .new-campaign-btn {
            background: var(--surface);
            border-radius: 16px;
            padding: 25px;
            border: 2px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .new-campaign-btn:hover {
            border-color: var(--primary);
            background: rgba(255, 107, 53, 0.05);
        }

        .new-campaign-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .new-campaign-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--surface);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            transform: scale(0.9);
            transition: all 0.3s;
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal h2 {
            margin-bottom: 20px;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-input, .form-select {
            width: 100%;
            padding: 14px;
            background: var(--surface-light);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            transition: all 0.2s;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn.cancel {
            background: var(--surface-light);
            color: var(--text);
        }

        .modal-btn.confirm {
            background: var(--primary);
            color: white;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface);
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-left: 5px solid var(--success);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">B</div>
                <span class="logo-text">BarFlow</span>
            </div>
            <button onclick="location.href='menu.html'" style="background:var(--primary);color:white;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:14px;">🏠 Menu</button>
            <div class="header-actions">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" placeholder="Buscar cliente...">
                </div>
                <button class="header-btn" onclick="openNewCustomerModal()">
                    ➕ Novo Cliente
                </button>
                <button class="header-btn primary" onclick="showToast('Campanha enviada!')">
                    📤 Enviar Promoções
                </button>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="nav-item" onclick="showSection('dashboard')">
                <span class="nav-icon">📊</span>
                <span>Dashboard</span>
            </div>
            <div class="nav-item active" onclick="showSection('clientes')">
                <span class="nav-icon">👥</span>
                <span>Clientes</span>
            </div>
            <div class="nav-item" onclick="showSection('fidelidade')">
                <span class="nav-icon">🎁</span>
                <span>Fidelidade</span>
            </div>
            <div class="nav-item" onclick="showSection('campanhas')">
                <span class="nav-icon">📧</span>
                <span>Campanhas</span>
            </div>
            <div class="nav-item" onclick="showSection('relatorios')">
                <span class="nav-icon">📈</span>
                <span>Relatórios</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: rgba(0, 200, 83, 0.1);">👥</div>
                    </div>
                    <div class="stat-value">1.247</div>
                    <div class="stat-label">Total de Clientes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: rgba(0, 217, 255, 0.1);">⭐</div>
                    </div>
                    <div class="stat-value">342</div>
                    <div class="stat-label">Clientes Ativos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: rgba(255, 107, 53, 0.1);">🎫</div>
                    </div>
                    <div class="stat-value">45.890</div>
                    <div class="stat-label">Pontos Emitidos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: rgba(255, 179, 0, 0.1);">💰</div>
                    </div>
                    <div class="stat-value">R$ 87</div>
                    <div class="stat-label">Ticket Médio</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="content-tabs">
                <button class="content-tab active">Todos</button>
                <button class="content-tab">VIP</button>
                <button class="content-tab">Ouro</button>
                <button class="content-tab">Prata</button>
                <button class="content-tab">Bronze</button>
                <button class="content-tab">Inativos</button>
            </div>

            <!-- Customers Table -->
            <div class="customers-table">
                <div class="table-header">
                    <div></div>
                    <div>Cliente</div>
                    <div>Nível</div>
                    <div>Pontos</div>
                    <div>Total Gasto</div>
                    <div>Última Visita</div>
                    <div>Ações</div>
                </div>
                <div id="customers-list">
                    <!-- Customers will be inserted by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- New Customer Modal -->
    <div class="modal-overlay" id="customer-modal">
        <div class="modal">
            <h2>➕ Novo Cliente</h2>
            <div class="form-group">
                <label class="form-label">Nome Completo</label>
                <input type="text" class="form-input" id="customer-name" placeholder="Ex: João Silva">
            </div>
            <div class="form-group">
                <label class="form-label">Telefone</label>
                <input type="tel" class="form-input" id="customer-phone" placeholder="(11) 99999-9999">
            </div>
            <div class="form-group">
                <label class="form-label">E-mail</label>
                <input type="email" class="form-input" id="customer-email" placeholder="joao@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">Data de Aniversário</label>
                <input type="date" class="form-input" id="customer-birthday">
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal()">Cancelar</button>
                <button class="modal-btn confirm" onclick="addCustomer()">Cadastrar</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span>✅</span>
        <span id="toast-message">Ação realizada!</span>
    </div>

    <script>
        // Customers Data
        const customers = [
            { id: 1, name: 'Ana Costa', email: 'ana@email.com', phone: '(11) 99999-0001', tier: 'vip', points: 3450, spent: 3240, visits: 45, lastVisit: '2 dias atrás', initials: 'AC', color: '#FF6B35' },
            { id: 2, name: 'Maria Santos', email: 'maria@email.com', phone: '(11) 99999-0002', tier: 'gold', points: 1890, spent: 1890, visits: 38, lastVisit: '5 dias atrás', initials: 'MS', color: '#FFD700' },
            { id: 3, name: 'João Pedro', email: 'joao@email.com', phone: '(11) 99999-0003', tier: 'gold', points: 1650, spent: 2456, visits: 32, lastVisit: '1 semana atrás', initials: 'JP', color: '#FFD700' },
            { id: 4, name: 'Carlos Lima', email: 'carlos@email.com', phone: '(11) 99999-0004', tier: 'silver', points: 890, spent: 890, visits: 22, lastVisit: '3 dias atrás', initials: 'CL', color: '#C0C0C0' },
            { id: 5, name: 'Patricia Alves', email: 'patricia@email.com', phone: '(11) 99999-0005', tier: 'silver', points: 720, spent: 720, visits: 18, lastVisit: '1 semana atrás', initials: 'PA', color: '#C0C0C0' },
            { id: 6, name: 'Roberto Silva', email: 'roberto@email.com', phone: '(11) 99999-0006', tier: 'bronze', points: 340, spent: 340, visits: 12, lastVisit: '2 semanas atrás', initials: 'RS', color: '#CD7F32' },
            { id: 7, name: 'Julia Martins', email: 'julia@email.com', phone: '(11) 99999-0007', tier: 'bronze', points: 280, spent: 280, visits: 8, lastVisit: '1 mês atrás', initials: 'JM', color: '#CD7F32' },
            { id: 8, name: 'Fernanda Costa', email: 'fernanda@email.com', phone: '(11) 99999-0008', tier: 'silver', points: 950, spent: 950, visits: 25, lastVisit: '4 dias atrás', initials: 'FC', color: '#C0C0C0' },
            { id: 9, name: 'Lucas Rodrigues', email: 'lucas@email.com', phone: '(11) 99999-0009', tier: 'bronze', points: 180, spent: 180, visits: 5, lastVisit: '1 mês atrás', initials: 'LR', color: '#CD7F32' },
            { id: 10, name: 'Amanda Souza', email: 'amanda@email.com', phone: '(11) 99999-0010', tier: 'inactive', points: 50, spent: 50, visits: 2, lastVisit: '3 meses atrás', initials: 'AS', color: '#9E9EB8' },
        ];

        function init() {
            renderCustomers();
            setupEventListeners();
        }

        function renderCustomers() {
            const container = document.getElementById('customers-list');
            container.innerHTML = customers.map(customer => `
                <div class="customer-row">
                    <div class="customer-avatar" style="background: ${customer.color}20; color: ${customer.color};">
                        ${customer.initials}
                    </div>
                    <div class="customer-info">
                        <h4>${customer.name}</h4>
                        <p>${customer.phone}</p>
                    </div>
                    <div>
                        <span class="tier-badge ${customer.tier}">${customer.tier.toUpperCase()}</span>
                    </div>
                    <div class="points-value">${customer.points.toLocaleString()}</div>
                    <div class="spent-value">R$ ${customer.spent.toLocaleString()}</div>
                    <div style="font-size: 13px; color: var(--text-muted);">${customer.lastVisit}</div>
                    <div>
                        <button class="action-btn" onclick="viewCustomer(${customer.id})">👁️</button>
                    </div>
                </div>
            `).join('');
        }

        function viewCustomer(id) {
            const customer = customers.find(c => c.id === id);
            alert(`📋 Perfil do Cliente\n\nNome: ${customer.name}\nTelefone: ${customer.phone}\nE-mail: ${customer.email}\nNível: ${customer.tier}\nPontos: ${customer.points}\nTotal Gasto: R$ ${customer.spent}\nVisitas: ${customer.visits}`);
        }

        function openNewCustomerModal() {
            document.getElementById('customer-modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('customer-modal').classList.remove('show');
        }

        function addCustomer() {
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            
            if (!name || !phone) {
                showToast('Preencha todos os campos!');
                return;
            }

            const initials = name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            
            customers.unshift({
                id: customers.length + 1,
                name: name,
                email: document.getElementById('customer-email').value,
                phone: phone,
                tier: 'bronze',
                points: 0,
                spent: 0,
                visits: 0,
                lastVisit: 'Hoje',
                initials: initials,
                color: '#FF6B35'
            });

            renderCustomers();
            closeModal();
            showToast(`${name} adicionado com sucesso!`);
            
            // Clear form
            document.getElementById('customer-name').value = '';
            document.getElementById('customer-phone').value = '';
            document.getElementById('customer-email').value = '';
        }

        function showSection(section) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            showToast(`Seção ${section} - Em breve!`);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function setupEventListeners() {
            // Content tabs
            document.querySelectorAll('.content-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.content-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                });
            });
        }

        init();
    </script>
